modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
[[mixins]]
config="create_processing.mixins.json"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
logoFile="assets/create_processing/logo/logo.png"
displayURL="${mod_display_url}"
description='''${mod_description}'''

[[dependencies."${mod_id}"]]
modId="neoforge"
type="required"
versionRange="${neo_version_range}"
ordering="AFTER"
side="BOTH"

[[dependencies."${mod_id}"]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="AFTER"
side="BOTH"

[[dependencies."${mod_id}"]]
modId="create"
type="required"
versionRange="[6.0.9,)"
ordering="AFTER"
side="BOTH"

